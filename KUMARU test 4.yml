    - data:
        code: "import json\nimport re\n\ndef clean_intent(intent: str) -> str:\n \
          \   intent = intent.strip('\"\\'#')\n    return intent.strip()\n\ndef extract_json(s:\
          \ str) -> dict:\n    s = s.strip()\n    if not s:\n        raise ValueError(\"\
          empty\")\n    try:\n        return json.loads(s)\n    except (json.JSONDecodeError,\
          \ ValueError):\n        pass\n    m = re.search(r'\\{.*\\}', s, re.DOTALL)\n\
          \    if m:\n        return json.loads(m.group())\n    raise ValueError(\"\
          no JSON found\")\n\ndef main(llm_output: str, llm_reasoning: str) -> dict:\n\
          \    for src in [llm_output, llm_reasoning]:\n        try:\n           \
          \ data = extract_json(src)\n            break\n        except (json.JSONDecodeError,\
          \ ValueError):\n            continue\n    else:\n        data = {\"agents\"\
          : [\"cultivation_agent\"], \"intent\": \"\"}\n    agents = data.get(\"agents\"\
          , []) or [\"cultivation_agent\"]\n\n    return {\n        \"intent\":  \
          \          clean_intent(data.get(\"intent\", \"\")),\n        \"run_price\"\
          :         \"price_agent\"         in agents,\n        \"run_cultivation\"\
          :   \"cultivation_agent\"   in agents,\n        \"run_geo_weather\":   \"\
