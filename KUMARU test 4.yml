            \ Agent ไหน แต่ต้องบอกแหล่งอ้างอิงที่ได้รับมาแต่ไม่ต้องบอก url\n- ตอบเหมือนผู้เชี่ยวชาญคนเดียวที่รู้ครบทุกด้าน\
