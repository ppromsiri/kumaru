          \    \n    raw_body = http_response\n    if isinstance(http_response, dict)\
          \ and \"body\" in http_response:\n        raw_body = http_response[\"body\"\
          ]\n    \n    data = []\n    if isinstance(raw_body, str):\n        try:\n\
          \            data = json.loads(raw_body)\n        except json.JSONDecodeError:\n\
          \            data = []\n    elif isinstance(raw_body, list):\n        data\
          \ = raw_body\n\n    summary_date = \"\"\n    if isinstance(data, list) and\
          \ len(data) > 0:\n        entry = data[0]\n        \n        summary_date\
          \ = entry.get(\"OilRemark2\", \"\") \n        if not summary_date:\n   \
          \         summary_date = entry.get(\"OilPriceDate\", \"\") \n        \n\
          \        oil_list_raw = entry.get(\"OilList\", \"[]\")\n        \n     \
          \   oil_items = []\n        if isinstance(oil_list_raw, str):\n        \
          \    try:\n                oil_items = json.loads(oil_list_raw)\n      \
          \      except json.JSONDecodeError:\n                oil_items = []\n  \
          \      else:\n            oil_items = oil_list_raw if isinstance(oil_list_raw,\
          \ list) else []\n            \n        for item in oil_items:\n        \
          \    prices.append({\n                \"name\": str(item.get(\"OilName\"\
          , \"\")),\n                \"yesterday\": str(item.get(\"PriceYesterday\"\
          , \"0\")),\n                \"today\": str(item.get(\"PriceToday\", \"0\"\
          )),\n                \"tomorrow\": str(item.get(\"PriceTomorrow\", \"0\"\
          )),\n                \"unit\": \"บาท\"\n            })\n            \n \
          \   text_summary = f\"{summary_date}:\\n\" if summary_date else \"ราคาน้ำมันบางจากฉบับล่าสุด:\\\
          n\"\n    if not prices:\n        text_summary += \"ไม่พบข้อมูลราคาน้ำมัน\"\
          \n    else:\n        for p in prices:\n            text_summary += f\"-\
          \ {p['name']}:\\n  เมื่อวาน: {p['yesterday']} | วันนี้: {p['today']} | พรุ่งนี้:\
          \ {p['tomorrow']} ({p['unit']})\\n\"\n    \n    return {\n        \"text_result\"\
          : text_summary,\n        \"date_info\": summary_date\n    }\n"
